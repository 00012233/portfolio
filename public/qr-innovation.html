<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>「医」心向党 — 案例页面二维码</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

    background: linear-gradient(135deg, #5C3A3A, #6B4545, #7D5252);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
  }
  .card {
    background: #F8F5F5;
    border-radius: 24px;
    padding: 48px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);

  }
  .card img {
    width: 280px;
    height: 280px;
    border-radius: 16px;
    margin-bottom: 24px;
  }
  .card h1 {
    font-size: 20px;
    color: #3A2020;

  }
  .card p {
    font-size: 13px;
    color: #8B6B6B;

    line-height: 1.5;
  }
  .card .url {
    font-size: 12px;
    color: #C4A0A0;

    border-radius: 10px;
