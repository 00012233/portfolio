<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astre — 个人作品集</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #2E3A34, #3D4F44, #4A5F50);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
  }
  .card {
    background: #F4F7F3;
    border-radius: 24px;
    padding: 48px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    max-width: 420px;
  }
  .card img {
    width: 280px;
    height: 280px;
    border-radius: 16px;
    margin-bottom: 24px;
  }
  .card h1 {
    font-size: 22px;
    color: #2E3A34;
    margin-bottom: 6px;
  }
  .card .en {
    font-size: 13px;
    color: #8FA398;
    margin-bottom: 16px;
  }
  .card .url {
    font-size: 12px;
    color: #A8C3A0;
    word-break: break-all;
    background: #E7EEE6;
    padding: 10px 16px;
    border-radius: 10px;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="card">
  <img src="qr-site.png" alt="QR Code">
  <h1>饶蓓 · Astre</h1>
  <p class="en">Project Operations | Marketing | Brand & Content</p>
  <div class="url">00012233.github.io/portfolio</div>
</div>
</body>
</html>
