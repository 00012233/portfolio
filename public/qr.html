<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码查看作品集</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #F4F7F3;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    max-width: 400px;
    width: 100%;
  }
  .qrcode-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  .qrcode-wrapper canvas,
  .qrcode-wrapper img {
    border-radius: 12px;
    border: 2px solid #E7EEE6;
  }
  .card h1 {
    font-size: 20px;
    color: #2E3A34;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .card .name {
    font-size: 15px;
    color: #6B7F75;
    margin-bottom: 4px;
  }
  .card .title {
    font-size: 13px;
    color: #8FA398;
    margin-bottom: 20px;
  }
  .card .url-box {
    font-size: 12px;
    color: #6B7F75;
    word-break: break-all;
    background: #F4F7F3;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 12px;
  }
  .card .url-box a {
    color: #2E3A34;
    text-decoration: none;
  }
  .card .hint {
    font-size: 13px;
    color: #A8C3A0;
    font-weight: 500;
  }
  .card .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .status.online {
    background: #E8F5E9;
    color: #2E7D32;
  }
  .status .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #2E7D32;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="status online">
    <span class="dot"></span>
    <span id="statusText">检测中...</span>
  </div>

  <div class="qrcode-wrapper" id="qrcode"></div>

  <h1>📱 扫码查看作品集</h1>
  <p class="name">饶蓓 · Astre</p>
  <p class="title">项目运营 | 市场营销 | 品牌与内容运营</p>
  <div class="url-box">
    <a id="urlLink" href="#" target="_blank"></a>
  </div>
  <p class="hint">Scan QR code to view portfolio ↗</p>
  <p class="hint" style="font-size:11px;margin-top:8px;color:#8FA398;">
    或直接点击上方链接打开
  </p>
</div>

<script>
// Try multiple tunnel URLs until one works
const CANDIDATES = [
  'https://6ecc2da549b663.lhr.life',
];

// Also try to get the current host's network IP as fallback
const LOCAL_URL = `http://192.168.1.4:3000`;

async function checkUrl(url) {
  try {
    const img = new Image();
    return new Promise((resolve) => {
      img.onload = () => resolve(true);
      img.onerror = () => resolve(false);
      img.src = url + '/favicon.ico?t=' + Date.now();
      setTimeout(() => resolve(false), 3000);
    });
  } catch {
    return false;
  }
}

async function init() {
  const statusEl = document.getElementById('statusText');
  const urlLink = document.getElementById('urlLink');
  const qrDiv = document.getElementById('qrcode');

  let finalUrl = CANDIDATES[0];

  // Check if tunnel URL works
  statusEl.textContent = '检测连接中...';
  const online = await checkUrl(CANDIDATES[0]);

  if (!online) {
    // Fallback: try local IP
    statusEl.textContent = '使用局域网模式';
    finalUrl = LOCAL_URL;
    document.querySelector('.status').className = 'status online';
    document.querySelector('.status .dot').style.background = '#F9A825';
    statusEl.textContent = '局域网模式（同WiFi可用）';
  } else {
    statusEl.textContent = '公网在线';
  }

  urlLink.href = finalUrl;
  urlLink.textContent = finalUrl;

  // Generate QR code
  if (typeof QRCode !== 'undefined') {
    new QRCode(qrDiv, {
      text: finalUrl,
      width: 240,
      height: 240,
      colorDark: '#2E3A34',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  } else {
    // QRCode library not loaded (CDN blocked), use backup API
    const img = document.createElement('img');
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=' + encodeURIComponent(finalUrl);
    img.width = 240;
    img.height = 240;
    img.onerror = () => {
      // Both failed, show manual URL
      qrDiv.innerHTML = '<div style="padding:40px;border:2px dashed #A8C3A0;border-radius:12px;color:#6B7F75;font-size:13px;">'
        + '二维码加载失败<br>请直接复制下方链接访问<br><br>'
        + '<span style="font-size:11px;word-break:break-all;">' + finalUrl + '</span></div>';
    };
    qrDiv.appendChild(img);
  }
}

init();
</script>
</body>
</html>
